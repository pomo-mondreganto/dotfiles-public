# sheldon plugin manifest — loaded by ~/.zshrc via a cached `sheldon source` call.
# Ordering matters; see inline comments.
# Managed by chezmoi. Run `sheldon lock --update` to refresh all clones.

shell = "zsh"

# ----------------------------------------------------------------------
# 1. fpath contributions — must precede compinit.
# ----------------------------------------------------------------------

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
apply = ["fpath"]

# ----------------------------------------------------------------------
# 2. OMZ base lib pieces that don't depend on compinit. The ohmyzsh repo
#    is cloned once (see omz-* plugin entries below) and reused via
#    `dir = "lib"`. We deliberately skip lib/theme-and-appearance.zsh and
#    lib/grep.zsh (both fork at runtime to probe coreutils flags) plus
#    a number of OMZ-theme-only files irrelevant with p10k.
# ----------------------------------------------------------------------

[plugins.omz-lib-history]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["history.zsh"]

[plugins.omz-lib-directories]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["directories.zsh"]

[plugins.omz-lib-functions]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["functions.zsh"]

# Must come after functions.zsh — misc.zsh uses env_default from there.
[plugins.omz-lib-misc]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["misc.zsh"]

[plugins.omz-lib-clipboard]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["clipboard.zsh"]

# ----------------------------------------------------------------------
# 3. OMZ plugins that don't register compdefs.
# ----------------------------------------------------------------------

[plugins.omz-colored-man-pages]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/colored-man-pages"
use = ["colored-man-pages.plugin.zsh"]

[plugins.omz-command-not-found]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/command-not-found"
use = ["command-not-found.plugin.zsh"]

[plugins.omz-common-aliases]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/common-aliases"
use = ["common-aliases.plugin.zsh"]

[plugins.omz-sudo]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/sudo"
use = ["sudo.plugin.zsh"]

# ----------------------------------------------------------------------
# 4. Run compinit here: after fpath is set, before fzf-tab (which must
#    wrap _main_complete) and before plugins that register compdefs at
#    source time. -C skips the security check (saves ~5ms).
# ----------------------------------------------------------------------

[plugins.compinit]
# unfunction first: dot_zshenv stubs compinit/compdef as no-ops to silence
# /etc/bash_completion.d/hydra (sourced by /etc/zsh/zshrc); autoload alone
# won't replace an existing function definition, so the stub would persist.
inline = 'unfunction compinit compdef 2>/dev/null; autoload -Uz compinit && compinit -C -d "${ZSH_COMPDUMP:-$HOME/.zcompdump}"'

# ----------------------------------------------------------------------
# 5. OMZ lib pieces that need compinit done. lib/completion.zsh sets
#    completion zstyles and runs bashcompinit. lib/key-bindings.zsh
#    registers the up-line-or-beginning-search / edit-command-line
#    widgets and binds them.
# ----------------------------------------------------------------------

[plugins.omz-lib-completion]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["completion.zsh"]

[plugins.omz-lib-key-bindings]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["key-bindings.zsh"]

# ----------------------------------------------------------------------
# 6. fzf-tab must come after compinit, before widget-wrapping plugins
#    (autosuggestions, syntax-highlighting). See fzf-tab README.
# ----------------------------------------------------------------------

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"

# ----------------------------------------------------------------------
# 7. Autosuggestions must come before syntax-highlighting.
#    (Both wrap the same ZLE widgets; load order matters per upstream.)
# ----------------------------------------------------------------------

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"

[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"

# ----------------------------------------------------------------------
# 8. Prompt.
# ----------------------------------------------------------------------

[plugins.powerlevel10k]
github = "romkatv/powerlevel10k"
